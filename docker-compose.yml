services:
  spring-ai-mcp-example-ollama:
    image: ollama/ollama
    ports:
      - 11434:11434
    volumes:
      - spring-ai-mcp-example-ollama-volume:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
              driver: nvidia
              count: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 2s
      timeout: 10s
      retries: 5

  spring-ai-mcp-example-ollama-model-setup:
    image: ollama/ollama
    depends_on:
      spring-ai-mcp-example-ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull qwen3:4b"
    environment:
      OLLAMA_HOST: http://spring-ai-mcp-example-ollama:11434
    restart: no

  spring-ai-mcp-example-mysql:
    image: mysql:9
    ports:
      - 3306:3306
    volumes:
      - spring-ai-mcp-example-mysql-volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: note_mcp_server_db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h localhost -uroot -pchangeme note_mcp_server_db -e 'SELECT 1' > /dev/null || exit 1",
        ]
      interval: 1s
      timeout: 2s
      retries: 60
    restart: unless-stopped

volumes:
  spring-ai-mcp-example-ollama-volume:
  spring-ai-mcp-example-mysql-volume:
